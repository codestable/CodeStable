feature: 2026-07-10-cs-feedback-evidence-pipeline
created: 2026-07-10

steps:
  - action: "行为等价微重构：按 transcript、privacy/model 和 reporter 职责拆分采集器与测试"
    exit_signal: "现有 CLI/schema v1 行为不变，既有 9 个 feedback tests 全绿，diff 仅含移动、import 和测试重排"
    status: done
  - action: "证据编排：引入 metadata-only 会话选择、trigger cutoff、normalized record、反馈事件包和环境/仓库上下文"
    exit_signal: "JSONL EOF/Claude JSON meta snapshot、correlation/unpaired 均锁定；metadata reader 禁止 read_records 且输出无 body；既有 3 个 current 用例+stale-mtime 新例证明只绕过 time_cutoff"
    status: done
  - action: "分诊计算：生成 observation/assessment 分层的 triage、字段来源、质量门和 public allowlist 投影"
    exit_signal: "triage_ready/regression_ready 由机械规则决定；缺口驱动追问；隐私对抗测试证明 public preview 无禁止内容"
    status: done
  - action: "评测交接：shipped converter 只产 candidate，repo-local eval 工具负责正式 promotion"
    exit_signal: "无 eval/config、profile/input/privacy 或真实 judge gate 失败均不落盘；repo-local 测试覆盖 candidate 正向+旧 skeleton 非零无文件，且只在 test 中连接两单元"
    status: done
  - action: "使用入口：更新 cs-feedback 协议、report template、execution conventions 模板/runtime copy及中英文公开文档"
    exit_signal: "SKILL/template 使用 incident/triage/quality 与 v1 映射；shared/execution conventions 模板/runtime 布局同步；所有文档保持 local-first 和确认后上传"
    status: done
  - action: "验证闭环：补 unit/contract/decision fixtures，运行全量 gate 并完成独立代码评审"
    exit_signal: "targeted/full pytest、runtime sync、diff check 通过；package findings 不新增；review 无 unresolved blocking/important"
    status: done

